name: mahoraga

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mahoraga-postgres
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # PGDATA in a subdir so initdb doesn't trip over `.gitkeep` at the mount root
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: mahoraga-litellm
    ports: ["4000:4000"]
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Hindsight memory layer (vectorize-io/hindsight) ───────────────────────
  # Reconciled 2026-06-20 to Hindsight's canonical **vchord** backend (vendored at
  # vendor/hindsight/docker/docker-compose/vchord/). Uses the PREBUILT multi-arch
  # tensorchord/vchord-suite image (VectorChord + BM25 pre-installed) — the
  # pg_textsearch variant's source-compiled pgvector crashed with SIGILL on this
  # host, so the prebuilt path is both correct and robust. The earlier wiring
  # (hindsight-api:v0.5.6, port 8080, HINDSIGHT_DB_URL) was speculative and wrong.
  hindsight-db:
    # PostgreSQL with VectorChord (vchord) + vchord_bm25 + pg_tokenizer pre-installed.
    image: tensorchord/vchord-suite:pg18-latest
    container_name: mahoraga-hindsight-db
    ports: ["5433:5432"]                    # 5433 on host to avoid conflict with mahoraga-postgres
    volumes:
      - ./data/hindsight-db:/var/lib/postgresql/18/docker   # image's default PGDATA
    environment:
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD}
      POSTGRES_DB: hindsight
      POSTGRES_USER: hindsight
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight -d hindsight"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot: create the vchord/BM25/tokenizer extensions in the hindsight DB
  # (mirrors the vendored vchord variant's `vectorchord-init` job).
  hindsight-db-init:
    image: tensorchord/vchord-suite:pg18-latest
    container_name: mahoraga-hindsight-db-init
    depends_on:
      hindsight-db:
        condition: service_healthy
    volumes:
      - ./infra/hindsight/init.sql:/init.sql:ro
    environment:
      PGPASSWORD: ${HINDSIGHT_DB_PASSWORD}
    entrypoint: ["bash", "-c"]
    command:
      - psql -h hindsight-db -U hindsight -d hindsight -v ON_ERROR_STOP=1 -f /init.sql
        && echo 'hindsight extensions + tokenizer ready'
    restart: "no"

  hindsight:
    # Pinned by digest (tag `latest` as of 2026-06-20). Pin a semver tag once
    # Hindsight publishes one on ghcr.
    image: ghcr.io/vectorize-io/hindsight@sha256:274704505b2720ac9a5c816c559044c1e8c6b51d47017317ae049ed2952f5ab1
    container_name: mahoraga-hindsight
    ports: ["8888:8888", "9999:9999"]       # 8888 = API/health/MCP; 9999 = admin
    depends_on:
      hindsight-db:
        condition: service_healthy
      hindsight-db-init:
        condition: service_completed_successfully
      litellm:
        condition: service_started
    environment:
      HINDSIGHT_API_DATABASE_URL: postgresql://hindsight:${HINDSIGHT_DB_PASSWORD}@hindsight-db:5432/hindsight
      HINDSIGHT_API_VECTOR_EXTENSION: vchord
      HINDSIGHT_API_TEXT_SEARCH_EXTENSION: vchord
      # LLM (reflect/synthesis) routed through our LiteLLM gateway -> Nemotron.
      HINDSIGHT_API_LLM_PROVIDER: openai            # LiteLLM is OpenAI-compatible
      HINDSIGHT_API_LLM_BASE_URL: http://litellm:4000/v1
      HINDSIGHT_API_LLM_API_KEY: ${LITELLM_MASTER_KEY}
      HINDSIGHT_API_LLM_MODEL: ${MAIN_MODEL:-nvidia/nemotron-ultra}
      # Embeddings: Hindsight's built-in LOCAL model (sentence-transformers on CPU).
      # NOT routed through LiteLLM — NVIDIA's nv-embedqa-* models are asymmetric and
      # require an `input_type` param the OpenAI embeddings API can't carry. bge-small
      # (384-dim) is light + fast; swap to BAAI/bge-m3 (1024-dim) if recall needs it.
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: local
      HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL: ${HINDSIGHT_EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      HINDSIGHT_API_EMBEDDINGS_LOCAL_FORCE_CPU: "1"

# Note: NemoClaw is NOT a Docker compose service. It runs on the host
# as a CLI (Node 22+) and orchestrates an OpenShell-managed sandbox
# outside of compose. Use scripts/onboard.sh after `make up` to bring
# the assistant online. Sidecars: Postgres (transactional state) +
# LiteLLM (multi-provider routing) + Hindsight (memory layer with its
# own pgvector instance for blast-radius isolation). See
# docs/superpowers/specs/2026-05-03-hindsight-memory-layer-revision.md
# for the memory architecture.

# All persistence uses bind mounts under ./data/ (host filesystem) rather
# than named volumes, so backups, inspection, and migration to cloud are
# straightforward.
