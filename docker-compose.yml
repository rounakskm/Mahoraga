name: mahoraga

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mahoraga-postgres
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # PGDATA in a subdir so initdb doesn't trip over `.gitkeep` at the mount root
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: mahoraga-litellm
    ports: ["4000:4000"]
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hindsight-db:
    image: pgvector/pgvector:pg16
    container_name: mahoraga-hindsight-db
    ports: ["5433:5432"]                    # 5433 on host to avoid conflict with mahoraga-postgres
    volumes:
      - ./data/hindsight-db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD}
      POSTGRES_DB: hindsight
      POSTGRES_USER: hindsight
      # PGDATA in a subdir so initdb doesn't trip over `.gitkeep` at the mount root
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight"]
      interval: 5s
      timeout: 3s
      retries: 10

  hindsight:
    image: ghcr.io/vectorize-io/hindsight-api:v0.5.6
    container_name: mahoraga-hindsight
    ports: ["8080:8080"]
    depends_on:
      hindsight-db:
        condition: service_healthy
      litellm:
        condition: service_started
    environment:
      HINDSIGHT_DB_URL: postgres://hindsight:${HINDSIGHT_DB_PASSWORD}@hindsight-db:5432/hindsight
      HINDSIGHT_API_LLM_API_KEY: ${LITELLM_MASTER_KEY}
      HINDSIGHT_API_LLM_BASE_URL: http://litellm:4000/v1
      # Cheap model for high-frequency entity extraction during retain()
      HINDSIGHT_API_LLM_MODEL: ollama/gemma4
      # Quality model for low-frequency reflect() synthesis
      HINDSIGHT_API_REFLECT_MODEL: ${MAIN_MODEL:-anthropic/claude-opus-4-7}

# Note: NemoClaw is NOT a Docker compose service. It runs on the host
# as a CLI (Node 22+) and orchestrates an OpenShell-managed sandbox
# outside of compose. Use scripts/onboard.sh after `make up` to bring
# the assistant online. Sidecars: Postgres (transactional state) +
# LiteLLM (multi-provider routing) + Hindsight (memory layer with its
# own pgvector instance for blast-radius isolation). See
# docs/superpowers/specs/2026-05-03-hindsight-memory-layer-revision.md
# for the memory architecture.

# All persistence uses bind mounts under ./data/ (host filesystem) rather
# than named volumes, so backups, inspection, and migration to cloud are
# straightforward.
