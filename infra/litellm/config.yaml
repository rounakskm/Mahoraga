model_list:
  # Local primary — Ollama on host (CPU-only on Apple Silicon).
  # NOTE: We route to a derived `gemma4-cpu:e4b` model that has `num_gpu 0`
  # baked into the Modelfile. Reason: Ollama 0.20.5's bundled ggml hits a
  # Metal-backend abort on Gemma-4's `per_layer_token_embd.weight` tensor
  # (per llama.cpp PR #17869). Until Ollama ships a build with that fix,
  # CPU inference is the working path. Recreate the alias with:
  #   printf 'FROM gemma4:e4b\nPARAMETER num_gpu 0\n' | ollama create gemma4-cpu:e4b -f -
  # NOTE: api_base is hardcoded because LiteLLM's YAML loader doesn't support
  # shell-style ${VAR:-default} substitution.
  - model_name: ollama/gemma4
    litellm_params:
      model: ollama/gemma4-cpu:e4b
      api_base: http://host.docker.internal:11434

  # Cloud fallback — Anthropic. Only used when ANTHROPIC_API_KEY is real.
  - model_name: anthropic/claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  # No automatic fallback chain — Phase 0 may run with an Anthropic placeholder
  # key, in which case fallback to Anthropic on Ollama failure would cascade
  # into an auth error. Callers explicitly pick the model.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
