# NemoClaw blueprint for Mahoraga.
# Driven by `nemoclaw onboard --agent hermes` (see onboard.env).
# Architecture anchors:
#   2026-04-26-architecture-revision-consolidated-assistant.md (one assistant per sandbox)
#   2026-06-12-hermes-runtime-migration.md (OpenClaw -> Hermes harness swap)

blueprint:
  name: mahoraga-trader
  description: |
    Self-improving regime-aware autonomous trading assistant.
    Trades US equities, ETFs, and BTC ETFs (long, swing trades).
    Coordinates Hunter / Guardian / Archivist subagents.

# The in-sandbox harness is NousResearch Hermes Agent (was OpenClaw until 2026-06-12).
# NemoClaw onboards it with `--agent hermes`; OpenShell remains the sandbox/policy layer.
agent:
  harness: hermes

  role: |
    You are the orchestrator of an autonomous trading system. Your job is to
    coordinate three subagents (Hunter, Guardian, Archivist) to propose, validate,
    archive, and execute trading strategies under hard risk limits and human
    operator override. Never bypass the hard risk limits — they live in the
    execution tools and reject orders that violate them, regardless of your reasoning.

  inference:
    provider: compatible-endpoints
    base_url: ${LITELLM_BASE_URL:-http://litellm:4000/v1}
    model: ${MAIN_MODEL:-anthropic/claude-opus-4-7}
    fallback: [ollama/gemma4]

  # Hermes gateway. NemoClaw bridges the host-facing port to the sandbox-internal
  # gateway (Hermes binds 127.0.0.1 internally; OpenShell forwards). API server is
  # bearer-auth'd — key supplied via onboard.env (HERMES_API_SERVER_KEY).
  gateway:
    api_server_host: 127.0.0.1
    api_server_port: 18642        # sandbox-internal; bridged to host 8642 by OpenShell
    auth: bearer                  # API_SERVER_KEY required; never run unauthenticated

  subagents_dir: subagents/
  tools_dir: ../../services/trader/tools/    # Phase 1+ adds tool modules here

  # Hermes self-evolution: auto-written SKILL.md files land in skills/agent_created/.
  # Only skills/stable/ is on the live tool path — see skills/README.md (Mitigation 2,
  # ADR 2026-06-12 §4). agent_created/ is NEVER mounted to the trading assistant.
  skills_dir: skills/stable/

policies:
  network:  policies/egress.yaml
  filesystem: policies/filesystem.yaml

operator_channels:
  telegram: ${TELEGRAM_BOT_TOKEN}             # halt / status / regime / strategy commands

# Phase 6 will add a Streamlit dashboard channel here.
