name: CI

on:
  push:
    branches: [main, phase-0-substrate-bringup]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project + test deps
        run: pip install -e ".[test]"
      - name: Run unit tests (exit 5 = no tests collected, tolerated)
        run: |
          set +e
          pytest -m "not integration" -v
          rc=$?
          # 0 passed, 5 no-tests-collected (acceptable when only integration tests exist)
          if [ "$rc" -eq 0 ] || [ "$rc" -eq 5 ]; then exit 0; fi
          exit "$rc"

  integration-smoke:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure env
        run: |
          cp .env.example .env
          echo "POSTGRES_PASSWORD=ci_password" >> .env
          echo "LITELLM_MASTER_KEY=sk-ci" >> .env
          echo "OLLAMA_MODEL=gemma4:e4b" >> .env
      - name: Start sidecars (postgres only — LiteLLM needs API keys CI doesn't have)
        run: |
          docker compose up -d postgres
      - name: Wait for Postgres healthcheck
        run: |
          timeout 60 bash -c 'until docker compose ps postgres | grep -q "healthy"; do sleep 2; done'
      - name: Install project + test deps
        run: pip install -e ".[test]"
      - name: Run Phase 0 Postgres migration smoke test
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-0/test_postgres_migrations.py -v
      - name: Run Phase 1 data-foundation Postgres-backed integration tests
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-1/data_foundation -v
      - name: Run Phase 1 feature-pipeline end-to-end integration tests (P1.4 F6)
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-1/feature_pipeline -v
      - name: Run Phase 1 regime-detector end-to-end integration tests (P1.5 R4)
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-1/regime -v
      - name: Run Phase 1 backtest-harness end-to-end integration tests (P1.6 B3)
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-1/backtest -v
      - name: Run Phase 1 audit-logger Postgres integration test
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest services/trader/data/tests/test_audit.py -v -m integration
      - name: Run Phase 2 wall-framework contract tests (P2.1)
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-2/wall_framework -v
      - name: Run Phase 3 provenance integration test
        run: |
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-3/provenance -v -m integration
      - name: Tear down
        if: always()
        run: docker compose down -v
