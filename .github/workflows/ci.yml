name: CI

on:
  push:
    branches: [main, phase-0-substrate-bringup]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest psycopg httpx
      - name: Run unit tests (exit 5 = no tests collected, tolerated in Phase 0)
        run: |
          set +e
          pytest -m "not integration" -v
          rc=$?
          # 0 passed, 5 no-tests-collected; only integration tests exist in Phase 0
          if [ "$rc" -eq 0 ] || [ "$rc" -eq 5 ]; then exit 0; fi
          exit "$rc"

  integration-smoke:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure env
        run: |
          cp .env.example .env
          echo "POSTGRES_PASSWORD=ci_password" >> .env
          echo "LITELLM_MASTER_KEY=sk-ci" >> .env
          echo "OLLAMA_MODEL=gemma4:e4b" >> .env
      - name: Start sidecars (postgres only — LiteLLM needs API keys CI doesn't have)
        run: |
          docker compose up -d postgres
      - name: Wait for Postgres healthcheck
        run: |
          timeout 60 bash -c 'until docker compose ps postgres | grep -q "healthy"; do sleep 2; done'
      - name: Run Postgres migration smoke test
        run: |
          pip install psycopg pytest
          MAHORAGA_TEST_DSN="postgresql://postgres:ci_password@localhost:5432/postgres" \
            pytest tests/integration/phase-0/test_postgres_migrations.py -v
      - name: Tear down
        if: always()
        run: docker compose down -v
